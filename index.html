<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tax Service Express | Showcase</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=4">
</head>
<body>
    <nav class="top-nav">
        <div class="logo">
            <svg width="24" height="20" viewBox="0 0 36 28" fill="currentColor">
                <rect x="0" y="0" width="10" height="5" />
                <rect x="13" y="0" width="10" height="5" />
                <rect x="26" y="0" width="10" height="5" />
                <rect x="0" y="8" width="10" height="5" />
                <rect x="13" y="8" width="10" height="5" />
                <rect x="26" y="8" width="10" height="5" />
                <rect x="0" y="16" width="10" height="5" />
                <rect x="13" y="16" width="10" height="5" />
                <rect x="26" y="16" width="10" height="5" />
                <rect x="0" y="24" width="10" height="5" />
                <rect x="13" y="24" width="10" height="5" />
                <rect x="26" y="24" width="10" height="5" />
            </svg>
            <span>Showcase</span>
        </div>
        <div class="tabs">
            <button class="tab-btn active" data-target="tab-presentation">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="20" height="14" x="2" y="3" rx="2"/><line x1="8" x2="16" y1="21" y2="21"/><line x1="12" x2="12" y1="17" y2="21"/></svg>
                Pitch Deck
            </button>
            <button class="tab-btn" data-target="tab-mobile">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="14" height="20" x="5" y="2" rx="2" ry="2"/><line x1="12" x2="12.01" y1="18" y2="18"/></svg>
                Mobile App
            </button>
            <button class="tab-btn" data-target="tab-landing">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg>
                Landing Page
            </button>
        </div>
    </nav>

    <main class="content-area">
        <!-- Presentation Tab -->
        <div id="tab-presentation" class="tab-pane active">
            <div class="iframe-wrapper full-width">
                <iframe src="https://docs.google.com/presentation/d/1qTVoLOretorBjgdbvrvvPPRJSdnF8L776WXD5-Qi0b4/embed?start=false&loop=false&delayms=3000" frameborder="0" allowfullscreen="true" mozallowfullscreen="true" webkitallowfullscreen="true"></iframe>
            </div>
        </div>

        <!-- Mobile App Tab -->
        <div id="tab-mobile" class="tab-pane">
            <div class="phone-mockup-wrapper">
                <div class="phone-mockup">
                    <div class="phone-notch"></div>
                        <iframe src="mvp/index.html?v=3" class="device-screen" title="Mobile App Prototype"></iframe>
                </div>
            </div>
        </div>

        <!-- Landing Page Tab -->
        <div id="tab-landing" class="tab-pane">
            <div class="iframe-wrapper full-width">
                <iframe src="landing/index.html?v=18" frameborder="0"></iframe>
            </div>
        </div>
    </main>

    <!-- Tour Overlay and Tooltip -->
    <div id="tour-overlay" class="tour-overlay hidden"></div>
    <div id="tour-tooltip" class="tour-tooltip hidden">
        <p id="tour-text"></p>
        <div class="tour-buttons">
            <button id="tour-next" class="btn-tour">Got it!</button>
        </div>
    </div>

    <script src="app.js?v=5"></script>
</body>
</html>
