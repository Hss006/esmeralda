<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tax App MVP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=8">
</head>
<body>
    <div id="mobile-container">
        <header id="app-header" class="hidden">
            <button id="back-btn" class="icon-btn hidden">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            </button>
            <h1 id="header-title"></h1>
        </header>

        <main id="app-content">
            <!-- Content will be injected here -->
        </main>

        <nav id="bottom-nav">
            <button class="nav-item active" data-view="home">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                <span>Home</span>
            </button>
            <button class="nav-item" data-view="services">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><line x1="3" x2="21" y1="9" y2="9"/><line x1="9" x2="9" y1="21" y2="9"/></svg>
                <span>Services</span>
            </button>
            <button class="nav-item" data-view="vault">
                <svg width="100" height="100" viewBox="0 0 100 100" fill="none" stroke="#FFD700" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" class="floating-arrow arrow-bounce-2" style="top: -90px; left: -20px;">
                    <path d="M 20 10 Q 30 60 80 80" />
                    <polyline points="60 85 80 80 75 60" />
                </svg>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12h10"/><path d="M9 4v16"/><path d="m3 9 3-3 3 3"/></svg>
                <span>Vault</span>
            </button>
            <button class="nav-item" data-view="profile">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                <span>Profile</span>
            </button>
        </nav>
    </div>

    <!-- Templates for different views -->
    <template id="tpl-home">
        <div class="view home-view">
            <div class="brand-header">
                <div class="brand-logo">
                    <svg width="28" height="22" viewBox="0 0 36 28" fill="currentColor">
                        <rect x="0" y="0" width="10" height="5" />
                        <rect x="13" y="0" width="10" height="5" />
                        <rect x="26" y="0" width="10" height="5" />
                        <rect x="0" y="8" width="10" height="5" />
                        <rect x="13" y="8" width="10" height="5" />
                        <rect x="26" y="8" width="10" height="5" />
                        <rect x="0" y="16" width="10" height="5" />
                        <rect x="13" y="16" width="10" height="5" />
                        <rect x="26" y="16" width="10" height="5" />
                        <rect x="0" y="24" width="10" height="5" />
                        <rect x="13" y="24" width="10" height="5" />
                        <rect x="26" y="24" width="10" height="5" />
                    </svg>
                    <span class="brand-name">Tax Service Express</span>
                </div>
            </div>
            
            <h1 class="greeting">Good morning, Alex</h1>
            
            <div class="card progress-card">
                <h3>You're halfway there.</h3>
                <p class="subtitle">Next step: Upload W-2.</p>
                <div class="progress-bar-container">
                    <div class="progress-bar" style="width: 45%;"></div>
                </div>
                <div class="progress-labels">
                    <span>Started</span>
                    <span>45%</span>
                    <span>Done</span>
                </div>
            </div>

            <div class="grid-2x2">
                <div class="card action-card" onclick="app.navigate('vault')">
                    <svg width="100" height="100" viewBox="0 0 100 100" fill="none" stroke="#FFD700" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" class="floating-arrow arrow-bounce-1" style="top: -60px; right: -20px;">
                        <path d="M 80 10 Q 70 60 20 80" />
                        <polyline points="40 85 20 80 25 60" />
                    </svg>
                    <div class="icon-circle">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>
                    </div>
                    <h4>Upload Docs</h4>
                    <p>3 items needed</p>
                </div>
                <div class="card action-card" onclick="app.navigate('booking')">
                    <div class="icon-circle icon-green">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>
                    </div>
                    <h4>Talk to an expert</h4>
                </div>
                <div class="card action-card" onclick="app.navigate('messages')">
                    <div class="icon-circle">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                        <span class="badge"></span>
                    </div>
                    <h4>Messages</h4>
                    <p>1 unread</p>
                </div>
                <div class="card action-card" onclick="app.navigate('profile')">
                    <div class="icon-circle">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                    </div>
                    <h4>Settings</h4>
                    <p>Profile & pref</p>
                </div>
            </div>
        </div>
    </template>

    <template id="tpl-services">
        <div class="view services-view">
            <h2 class="view-title">What do you need help<br>with this year?</h2>
            <p class="view-subtitle">Select a package to get started.</p>

            <div class="package-list">
                <div class="card package-card" onclick="app.selectPackage('Simple Return')">
                    <div class="package-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                    </div>
                    <div class="package-details">
                        <h4>Simple Return</h4>
                        <p>For individuals and families</p>
                    </div>
                    <div class="package-price">$99</div>
                </div>

                <div class="card package-card" onclick="app.selectPackage('1099 & Gig Work')">
                    <div class="package-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="20" height="14" x="2" y="3" rx="2"/><line x1="8" x2="16" y1="21" y2="21"/><line x1="12" x2="12" y1="17" y2="21"/></svg>
                    </div>
                    <div class="package-details">
                        <h4>1099 & Gig Work</h4>
                        <p>For independent contractors</p>
                    </div>
                    <div class="package-price">$199</div>
                </div>

                <div class="card package-card" onclick="app.selectPackage('LLC / S-Corp')">
                    <div class="package-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="20" height="14" x="2" y="7" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
                    </div>
                    <div class="package-details">
                        <h4>LLC / S-Corp</h4>
                        <p>For small business owners</p>
                    </div>
                    <div class="package-price">$399</div>
                </div>
            </div>
        </div>
    </template>

    <template id="tpl-booking">
        <div class="view booking-view">
            <div class="cpa-card card">
                <img src="https://i.pravatar.cc/150?img=47" alt="Sarah, CPA" class="avatar">
                <div class="cpa-details">
                    <h4>Sarah, CPA</h4>
                    <p class="badge-text"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg> Tax Advisor</p>
                </div>
            </div>

            <div class="section-header">
                <h3>Select a Date</h3>
                <span class="month">October</span>
            </div>
            
            <div class="calendar-strip">
                <div class="date-bubble" onclick="app.selectDate(this)">
                    <span class="day">MON</span>
                    <span class="num">14</span>
                </div>
                <div class="date-bubble active" onclick="app.selectDate(this)">
                    <span class="day">TUE</span>
                    <span class="num">15</span>
                </div>
                <div class="date-bubble" onclick="app.selectDate(this)">
                    <span class="day">WED</span>
                    <span class="num">16</span>
                </div>
                <div class="date-bubble" onclick="app.selectDate(this)">
                    <span class="day">THU</span>
                    <span class="num">17</span>
                </div>
            </div>

            <div class="section-header">
                <h3>Available Times</h3>
            </div>

            <div class="time-grid">
                <button class="time-btn" onclick="app.selectTime(this)">09:00 AM</button>
                <button class="time-btn active" onclick="app.selectTime(this)">10:00 AM</button>
                <button class="time-btn" onclick="app.selectTime(this)">11:30 AM</button>
                <button class="time-btn" onclick="app.selectTime(this)">01:00 PM</button>
                <button class="time-btn" onclick="app.selectTime(this)">02:30 PM</button>
                <button class="time-btn" onclick="app.selectTime(this)">04:00 PM</button>
            </div>

            <div class="sticky-footer">
                <button class="btn-primary" onclick="app.confirmAppointment()">Confirm Appointment <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg></button>
            </div>
        </div>
    </template>

    <template id="tpl-vault">
        <div class="view vault-view">
            <div class="upload-zone card">
                <div class="upload-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#2CE16A" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>
                </div>
                <h3>Tap to scan or upload</h3>
                <p>Supports PDF, JPG, PNG</p>
                <input type="file" id="file-upload" class="hidden-file-input" onchange="app.simulateUpload(this)" />
            </div>

            <div class="doc-section">
                <h4 class="section-title">NEEDS ACTION</h4>
                <div id="needs-action-list">
                    <div class="doc-card card" id="w2-doc">
                        <div class="doc-icon danger">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12.01" y1="17" y2="17"/></svg>
                        </div>
                        <div class="doc-details">
                            <h4>W-2 Form</h4>
                            <p class="danger-text">Awaiting upload</p>
                        </div>
                        <button class="icon-btn" onclick="document.getElementById('file-upload').click()">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
                        </button>
                    </div>
                </div>
            </div>

            <div class="doc-section">
                <h4 class="section-title">UPLOADED</h4>
                <div class="doc-card card">
                    <div class="doc-icon success">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                    </div>
                    <div class="doc-details">
                        <h4>1099_GigWork.pdf</h4>
                        <p>2.4 MB</p>
                    </div>
                    <button class="icon-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
                    </button>
                </div>
                <div class="doc-card card">
                    <div class="doc-icon success">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                    </div>
                    <div class="doc-details">
                        <h4>ID_Passport.jpg</h4>
                        <p>1.1 MB</p>
                    </div>
                    <button class="icon-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
                    </button>
                </div>
            </div>
        </div>
    </template>

    <template id="tpl-messages">
        <div class="view messages-view">
            <div class="chat-container" id="chat-container">
                <div class="chat-message received">
                    <img src="https://i.pravatar.cc/150?img=47" alt="Sarah, CPA" class="chat-avatar">
                    <div class="chat-bubble">
                        <p>Hi Alex! I reviewed your 1099 form. Looks good, just waiting on the W-2.</p>
                        <span class="chat-time">10:45 AM</span>
                    </div>
                </div>
            </div>
            
            <div class="chat-input-area">
                <button class="icon-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
                </button>
                <input type="text" id="chat-input" placeholder="Type a message..." onkeypress="app.handleChatInput(event)">
                <button class="send-btn" onclick="app.sendMessage()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                </button>
            </div>
        </div>
    </template>

    <template id="tpl-profile">
        <div class="view profile-view">
            <div class="profile-header">
                <div class="profile-avatar-container">
                    <img src="https://i.pravatar.cc/150?img=11" alt="Alex Doe" class="profile-avatar">
                    <div class="edit-badge">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>
                    </div>
                </div>
                <h2>Alex Doe</h2>
                <p>alex.doe@example.com</p>
            </div>

            <div class="card detail-card">
                <h3 class="card-title">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    Personal Details
                </h3>
                
                <div class="detail-row">
                    <div class="detail-info">
                        <label>Full Name</label>
                        <p>Alexander Doe</p>
                    </div>
                    <button class="text-btn">Edit</button>
                </div>
                
                <div class="detail-row">
                    <div class="detail-info">
                        <label>Social Security</label>
                        <p>• • • - • • - 1 2 3 4</p>
                    </div>
                </div>

                <div class="detail-row">
                    <div class="detail-info">
                        <label>Home Address</label>
                        <p id="profile-address-text">123 Calm Lane<br>Apt 4B<br>Seattle, WA 98101</p>
                        <input type="text" id="profile-address-input" class="hidden" value="123 Calm Lane, Apt 4B, Seattle, WA 98101" style="font-size: 14px; padding: 4px; border: 1px solid #E5E7EB; border-radius: 4px; width: 100%;">
                    </div>
                    <button class="text-btn" id="btn-edit-address" onclick="app.editProfileField('address')">Edit</button>
                </div>
            </div>

            <div class="card detail-card">
                <h3 class="card-title">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/></svg>
                    Direct Deposit
                </h3>
                
                <div class="detail-row">
                    <div class="detail-info">
                        <label>Bank Name</label>
                        <p id="profile-bank-text">Chase Bank</p>
                        <input type="text" id="profile-bank-input" class="hidden" value="Chase Bank" style="font-size: 14px; padding: 4px; border: 1px solid #E5E7EB; border-radius: 4px; width: 100%;">
                    </div>
                    <button class="text-btn" id="btn-edit-bank" onclick="app.editProfileField('bank')">Edit</button>
                </div>
                
                <div class="detail-row">
                    <div class="detail-info">
                        <label>Account Number</label>
                        <p>•••• 4567</p>
                    </div>
                </div>
            </div>

            <div class="past-returns-section">
                <h3>Past Returns</h3>
                <div class="returns-scroll">
                    <div class="card return-card">
                        <div class="return-icon processing">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12h10"/><path d="M9 4v16"/><path d="m3 9 3-3 3 3"/></svg>
                        </div>
                        <label>2023 Return</label>
                        <h4 class="processing-text">Processing</h4>
                    </div>
                    <div class="card return-card">
                        <div class="return-icon success">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                        </div>
                        <label>2022 Return</label>
                        <h4 class="success-text">+$1,240</h4>
                    </div>
                </div>
            </div>

            <button class="btn-outline logout-btn" onclick="app.logout()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>
                Sign Out
            </button>
        </div>
    </template>

    <template id="tpl-login">
        <div class="view login-view">
            <div class="login-header">
                <svg width="40" height="32" viewBox="0 0 36 28" fill="var(--primary)" style="margin-bottom: 24px;">
                    <rect x="0" y="0" width="10" height="5" />
                    <rect x="13" y="0" width="10" height="5" />
                    <rect x="26" y="0" width="10" height="5" />
                    <rect x="0" y="8" width="10" height="5" />
                    <rect x="13" y="8" width="10" height="5" />
                    <rect x="26" y="8" width="10" height="5" />
                    <rect x="0" y="16" width="10" height="5" />
                    <rect x="13" y="16" width="10" height="5" />
                    <rect x="26" y="16" width="10" height="5" />
                    <rect x="0" y="24" width="10" height="5" />
                    <rect x="13" y="24" width="10" height="5" />
                    <rect x="26" y="24" width="10" height="5" />
                </svg>
                <h2>Welcome Back</h2>
                <p>Sign in to your Tax Service Express account to manage your documents.</p>
            </div>
            
            <div class="login-form">
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="alex.doe@example.com" value="alex.doe@example.com">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" placeholder="••••••••" value="password123">
                </div>
                <button class="btn-primary login-btn" onclick="app.login()">Sign In</button>
            </div>
        </div>
    </template>

    <script src="app.js?v=7"></script>
</body>
</html>
